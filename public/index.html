<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Stuck with the default viewport (no viewport-fit=cover). Tried
         cover briefly to get the green theme-color to extend behind the
         iOS status bar, but it broke the bottom tab bar layout — env()
         values weren't applied until a layout-trigger event (keyboard
         opening), so on first paint the tabs sat partly behind the home
         indicator. theme-color alone gives the green status-bar tint
         in PWA standalone mode without this side effect. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Watchlist — vintage watches from independent dealers, in one feed</title>
    <meta name="description" content="Watchlist aggregates active inventory from 36 independent vintage-watch dealers and tracks upcoming auctions from 6 houses. One feed, no ads, with cross-run change tracking so new arrivals and price drops surface clearly." />
    <link rel="canonical" href="https://the-watch-list.app/" />

    <!-- Open Graph / Twitter card. og:image points at the existing
         apple-touch-icon (1024×1024) — placeholder until a proper
         1200×630 social preview is generated. Most platforms will
         centre-crop the square. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Watchlist" />
    <meta property="og:title" content="Watchlist — vintage watches from independent dealers, in one feed" />
    <meta property="og:description" content="Active inventory from 36 independent vintage-watch dealers plus upcoming auctions from 6 houses, in one chronological feed. No ads, cross-run change tracking, free." />
    <meta property="og:url" content="https://the-watch-list.app/" />
    <meta property="og:image" content="https://the-watch-list.app/apple-touch-icon.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Watchlist — vintage watches from independent dealers, in one feed" />
    <meta name="twitter:description" content="Active inventory from 36 independent vintage-watch dealers plus upcoming auctions from 6 houses, in one chronological feed." />
    <meta name="twitter:image" content="https://the-watch-list.app/apple-touch-icon.png" />

    <link rel="apple-touch-icon" sizes="1024x1024" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <meta name="apple-mobile-web-app-title" content="Watchlist" />
    <!-- PWA install capability. The standardised `mobile-web-app-capable`
         is what modern Chrome (Android + desktop) reads; iOS Safari
         still reads only the apple- prefixed version, so we ship both.
         Chrome consoles a deprecation warning if the apple- one
         appears alone — adding the standard form silences it without
         breaking iOS PWA install. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- iOS PWA status bar: "default" lets theme-color tint it. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- Theme color drives the iOS PWA status bar tint (and Android
         Chrome address bar). Spell it out for both light and dark
         schemes so dark-mode phones don't fall back to system black. -->
    <meta name="theme-color" content="#3b4a36" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#3b4a36" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#3b4a36" />

    <!-- Schema.org JSON-LD. WebSite + minimal Organization so Google can
         render a sitelinks search box and pull a clean knowledge-graph
         entry. SearchAction is wired to the in-app search via a
         query-param target — there's no formal /search route, but the
         Listings tab consumes ?search= and renders matching items. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Watchlist",
      "alternateName": "The Watch List",
      "url": "https://the-watch-list.app/",
      "description": "Aggregator for vintage watches from independent dealers and auction houses. One feed, cross-run change tracking, no ads.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://the-watch-list.app/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { -webkit-font-smoothing: antialiased; }

      /*
        Print scoping for in-app print-to-scale tools (currently:
        References → Watch size comparison). Each tool renders its
        printable sheet via React Portal as a direct child of <body>
        with class `size-compare-print-sheet-portal` (or whatever
        future tools use). When printing, hide every direct child of
        <body> EXCEPT that one — that hides the entire React app
        (#root) and surfaces only the print sheet.

        Why portal-scoped instead of `body * { visibility: hidden }`:
        the prototype's pattern was global and brittle. Scoping by
        portal class keeps print clean, leaves printing from any
        OTHER page on the site unaffected, and works regardless of
        where in the app's tree the tool is mounted.

        Add a new printable tool: render its sheet via createPortal
        to document.body with a class matching the selector below
        (or extend the selector to a list).
      */
      @media print {
        body { background: #fff; }
        body > *:not(.size-compare-print-sheet-portal) { display: none !important; }
        .size-compare-print-sheet-portal { display: block !important; }
        @page { size: letter portrait; margin: 0.5in; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
