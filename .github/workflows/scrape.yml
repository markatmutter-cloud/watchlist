name: Scrape watch listings

on:
  schedule:
    - cron: '0 7 * * *'   # 8am UK (BST)
    - cron: '0 21 * * *'  # 10pm UK (BST)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Wind Vintage scraper
        run: python windvintage_scraper.py

      - name: Run Menta Watches scraper
        run: python menta_scraper.py

      - name: Run Collectors Corner NY scraper
        run: python collectorscorner_scraper.py

      - name: Run Falco Watches scraper
        run: python falco_scraper.py

      - name: Run Tropical Watch scraper (Browse AI)
        env:
          BROWSE_AI_API_KEY: ${{ secrets.BROWSE_AI_API_KEY }}
        run: python tropicalwatch_scraper.py --latest

      - name: Move CSVs to data folder
        run: |
          mkdir -p data
          [ -f windvintage_listings.csv ]      && mv windvintage_listings.csv data/windvintage.csv      || echo "windvintage csv missing"
          [ -f menta_listings.csv ]            && mv menta_listings.csv data/menta.csv                  || echo "menta csv missing"
          [ -f collectorscorner_listings.csv ] && mv collectorscorner_listings.csv data/collectorscorner.csv || echo "ccny csv missing"
          [ -f falco_listings.csv ]            && mv falco_listings.csv data/falco.csv                  || echo "falco csv missing"
          [ -f tropicalwatch_listings.csv ]    && mv tropicalwatch_listings.csv data/tropicalwatch.csv  || echo "tropicalwatch csv missing"

      - name: Merge into listings.json
        run: python merge.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/
          git diff --staged --quiet || git commit -m "Update listings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
