name: Scrape watch listings

on:
  schedule:
    - cron: '0 14 * * *'   # 7am PDT — single daily run (enough for sources
                           # that list a handful of watches per day, and
                           # halves Browse AI row usage vs twice daily)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Wind Vintage scraper
        run: python windvintage_scraper.py

      - name: Run Menta Watches scraper
        run: python menta_scraper.py

      - name: Run Collectors Corner NY scraper
        run: python collectorscorner_scraper.py

      - name: Run Falco Watches scraper
        run: python falco_scraper.py

      - name: Run Tropical Watch scraper (Browse AI)
        env:
          BROWSE_AI_API_KEY: ${{ secrets.BROWSE_AI_API_KEY }}
        run: python tropicalwatch_scraper.py --latest

      - name: Run Grey & Patina scraper
        # Each scraper step uses `continue-on-error: true` so one failing
        # source (Cloudflare block, timeout, etc.) doesn't kill the others.
        # merge.py handles missing CSVs gracefully.
        continue-on-error: true
        run: python greyandpatina_scraper.py

      - name: Run Oliver & Clarke scraper
        continue-on-error: true
        run: python oliverandclarke_scraper.py

      - name: Run Craft & Tailored scraper
        continue-on-error: true
        run: python craftandtailored_scraper.py

      - name: Run Watch Brothers London scraper
        continue-on-error: true
        run: python watchbrotherslondon_scraper.py

      - name: Run MVV Watches scraper
        continue-on-error: true
        run: python mvvwatches_scraper.py

      - name: Run DB1983 scraper
        continue-on-error: true
        run: python db1983_scraper.py

      - name: Run Hairspring scraper
        continue-on-error: true
        run: python hairspring_scraper.py

      - name: Run Somlo scraper
        continue-on-error: true
        run: python somlo_scraper.py

      - name: Run Analog Shift scraper
        continue-on-error: true
        run: python analogshift_scraper.py

      - name: Run Watches of Knightsbridge scraper
        continue-on-error: true
        run: python watchesofknightsbridge_scraper.py

      - name: Run Belmont Watches scraper
        continue-on-error: true
        run: python belmont_scraper.py

      - name: Run Bob's Watches scraper
        continue-on-error: true
        run: python bobswatches_scraper.py

      - name: Run Antiquorum auctions scraper
        continue-on-error: true
        run: python antiquorum_auctions_scraper.py

      - name: Run Monaco Legend auctions scraper
        continue-on-error: true
        run: python monacolegend_auctions_scraper.py

      - name: Run Phillips auctions scraper
        continue-on-error: true
        run: python phillips_auctions_scraper.py

      - name: Run Bonhams auctions scraper
        continue-on-error: true
        run: python bonhams_auctions_scraper.py

      - name: Move CSVs to data folder
        run: |
          mkdir -p data
          [ -f windvintage_listings.csv ]         && mv windvintage_listings.csv         data/windvintage.csv         || echo "windvintage missing"
          [ -f menta_listings.csv ]               && mv menta_listings.csv               data/menta.csv               || echo "menta missing"
          [ -f collectorscorner_listings.csv ]    && mv collectorscorner_listings.csv    data/collectorscorner.csv    || echo "ccny missing"
          [ -f falco_listings.csv ]               && mv falco_listings.csv               data/falco.csv               || echo "falco missing"
          [ -f tropicalwatch_listings.csv ]       && mv tropicalwatch_listings.csv       data/tropicalwatch.csv       || echo "tropicalwatch missing"
          [ -f greyandpatina_listings.csv ]       && mv greyandpatina_listings.csv       data/greyandpatina.csv       || echo "greyandpatina missing"
          [ -f oliverandclarke_listings.csv ]     && mv oliverandclarke_listings.csv     data/oliverandclarke.csv     || echo "oliverandclarke missing"
          [ -f craftandtailored_listings.csv ]    && mv craftandtailored_listings.csv    data/craftandtailored.csv    || echo "craftandtailored missing"
          [ -f watchbrotherslondon_listings.csv ] && mv watchbrotherslondon_listings.csv data/watchbrotherslondon.csv || echo "watchbrotherslondon missing"
          [ -f mvvwatches_listings.csv ]          && mv mvvwatches_listings.csv          data/mvvwatches.csv          || echo "mvvwatches missing"
          [ -f db1983_listings.csv ]              && mv db1983_listings.csv              data/db1983.csv              || echo "db1983 missing"
          [ -f hairspring_listings.csv ]          && mv hairspring_listings.csv          data/hairspring.csv          || echo "hairspring missing"
          [ -f somlo_listings.csv ]               && mv somlo_listings.csv               data/somlo.csv               || echo "somlo missing"
          [ -f analogshift_listings.csv ]         && mv analogshift_listings.csv         data/analogshift.csv         || echo "analogshift missing"
          [ -f watchesofknightsbridge_listings.csv ] && mv watchesofknightsbridge_listings.csv data/watchesofknightsbridge.csv || echo "wok missing"
          [ -f belmont_listings.csv ]             && mv belmont_listings.csv             data/belmont.csv             || echo "belmont missing"
          [ -f bobswatches_listings.csv ]         && mv bobswatches_listings.csv         data/bobswatches.csv         || echo "bobswatches missing"
          [ -f antiquorum_auctions_listings.csv ]   && mv antiquorum_auctions_listings.csv   data/antiquorum_auctions.csv   || echo "antiquorum auctions missing"
          [ -f monacolegend_auctions_listings.csv ] && mv monacolegend_auctions_listings.csv data/monacolegend_auctions.csv || echo "monacolegend auctions missing"
          [ -f phillips_auctions_listings.csv ]   && mv phillips_auctions_listings.csv   data/phillips_auctions.csv   || echo "phillips auctions missing"
          [ -f bonhams_auctions_listings.csv ]    && mv bonhams_auctions_listings.csv    data/bonhams_auctions.csv    || echo "bonhams auctions missing"

      - name: Merge into listings.json
        run: python merge.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/
          git diff --staged --quiet || git commit -m "Update listings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
