name: Tests

# Two suites: pytest for the Python merge/scraper logic, jest for the
# React shells. Both are small and fast (sub-second pytest + a few
# seconds for jest after install) so running on every push to main and
# every PR is cheap. Catching a render-time crash in CI beats finding
# it from a white screen on production.

# Workflow-level env: opt actions running on Node 20 into Node 24 now,
# silencing the deprecation warning ahead of June 2026 when runners
# force the upgrade anyway. Cheap future-proofing.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test deps
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest

  jest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No `cache: 'npm'` — we don't commit a lockfile, and
          # setup-node's npm cache mode hard-requires one. Fresh
          # install each run is fine at our scale (~30s).

      - name: Install dependencies
        run: npm install

      - name: Run jest (CI mode — single run, no watch)
        run: npm run test:ci
