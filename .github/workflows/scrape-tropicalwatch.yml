name: Scrape Tropical Watch only

# Refreshes just the Tropical Watch source without touching the other 23.
# State.json still updates (so disappeared TW items get marked inactive
# and new ones picked up) and listings.json is regenerated from the
# complete set.
#
# Browse AI integration: this workflow TRIGGERS a fresh robot run (not
# `--latest`) and polls until completion. That keeps the schedule in
# ONE place — this file — instead of needing alignment between Browse
# AI's own schedule and the GitHub cron. Each run consumes Browse-AI
# credits up to the watches_limit set in the scraper (150 today).
#
# Cost note: 2 runs/day × 150 watches × ~30 days = ~9k credits/month at
# the cap. If TW inventory is below the cap, fewer credits are billed.
# If the Browse AI quota is tighter than that, drop to 1 run/day or
# lower the watches_limit in tropicalwatch_scraper.py.

on:
  schedule:
    # 6am PST / 7am PDT — aligns with the morning listings cron so TW
    # updates land alongside the other dealers in the morning feed.
    - cron: '0 14 * * *'
    # 6pm PST / 7pm PDT — same alignment for the evening run.
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape-tw:
    runs-on: ubuntu-latest
    # Each run includes a Browse-AI poll loop that can wait up to MAX_WAIT
    # (10 min) for the robot to finish.
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Tropical Watch scraper (triggers Browse AI + polls)
        env:
          BROWSE_AI_API_KEY: ${{ secrets.BROWSE_AI_API_KEY }}
        # No --latest flag: scraper triggers a fresh robot run, polls
        # until completion, then writes the CSV. One credit charge per
        # cron firing.
        run: python tropicalwatch_scraper.py

      - name: Move TW CSV to data folder
        run: |
          mkdir -p data
          [ -f tropicalwatch_listings.csv ] && mv tropicalwatch_listings.csv data/tropicalwatch.csv || echo "tropicalwatch missing"

      - name: Merge into listings.json
        run: python merge.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tropicalwatch.csv public/
          git diff --staged --quiet || git commit -m "Update TW listings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
