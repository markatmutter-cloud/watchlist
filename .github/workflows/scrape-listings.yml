name: Scrape listings

on:
  schedule:
    # Three daily runs scheduled around morning, midday, and evening
    # Pacific time so the freshest data lands right when Mark checks the
    # site. GitHub Actions cron is UTC and does NOT observe DST — the
    # times below shift by an hour twice a year. We've biased toward
    # "good enough year-round" rather than perfect on either side.
    - cron: '0 14 * * *'   # 6am PST / 7am PDT — morning slot
    - cron: '0 20 * * *'   # noon PST / 1pm PDT — midday slot
    - cron: '0 2 * * *'    # 6pm PST / 7pm PDT — evening slot (02:00 UTC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Wind Vintage scraper
        run: python windvintage_scraper.py

      - name: Run Menta Watches scraper
        run: python menta_scraper.py

      - name: Run Collectors Corner NY scraper
        run: python collectorscorner_scraper.py

      - name: Run Falco Watches scraper
        run: python falco_scraper.py

      - name: Run Tropical Watch scraper (Browse AI)
        env:
          BROWSE_AI_API_KEY: ${{ secrets.BROWSE_AI_API_KEY }}
        run: python tropicalwatch_scraper.py --latest

      - name: Run Grey & Patina scraper
        # Each scraper step uses `continue-on-error: true` so one failing
        # source (Cloudflare block, timeout, etc.) doesn't kill the others.
        # merge.py handles missing CSVs gracefully.
        continue-on-error: true
        run: python greyandpatina_scraper.py

      - name: Run Oliver & Clarke scraper
        continue-on-error: true
        run: python oliverandclarke_scraper.py

      - name: Run Craft & Tailored scraper
        continue-on-error: true
        run: python craftandtailored_scraper.py

      - name: Run Watch Brothers London scraper
        continue-on-error: true
        run: python watchbrotherslondon_scraper.py

      - name: Run MVV Watches scraper
        continue-on-error: true
        run: python mvvwatches_scraper.py

      - name: Run DB1983 scraper
        continue-on-error: true
        run: python db1983_scraper.py

      - name: Run Hairspring scraper
        continue-on-error: true
        run: python hairspring_scraper.py

      - name: Run Somlo scraper
        continue-on-error: true
        run: python somlo_scraper.py

      - name: Run Analog Shift scraper
        continue-on-error: true
        run: python analogshift_scraper.py

      - name: Run Watches of Knightsbridge scraper
        continue-on-error: true
        run: python watchesofknightsbridge_scraper.py

      - name: Run Belmont Watches scraper
        continue-on-error: true
        run: python belmont_scraper.py

      - name: Run Bob's Watches scraper
        continue-on-error: true
        run: python bobswatches_scraper.py

      - name: Run Watchfid scraper
        continue-on-error: true
        run: python watchfid_scraper.py

      - name: Run Bulang & Sons scraper
        continue-on-error: true
        run: python bulangandsons_scraper.py

      - name: Run Moonphase scraper (via pushers.io)
        continue-on-error: true
        run: python moonphase_scraper.py

      - name: Run Huntington Company scraper
        continue-on-error: true
        run: python huntington_scraper.py

      - name: Run The Vintage Watch scraper
        continue-on-error: true
        run: python thevintagewatch_scraper.py

      - name: Run Avocado Vintage scraper
        continue-on-error: true
        run: python avocadovintage_scraper.py

      - name: Run Chronoholic scraper (Omega category only)
        continue-on-error: true
        run: python chronoholic_scraper.py

      - name: Run Vintage Watch Fam scraper
        continue-on-error: true
        run: python vintagewatchfam_scraper.py

      - name: Run Shuck the Oyster scraper (WordPress, detail-page walk)
        # ~3-5 min runtime — walks /portfolio/ pages then fetches each
        # detail page for price extraction. Continue-on-error so a slow
        # response doesn't block the rest of the batch.
        continue-on-error: true
        run: python shucktheoyster_scraper.py

      - name: Run Central Watch scraper (custom PHP, paginated HTML)
        continue-on-error: true
        run: python centralwatch_scraper.py

      - name: Run European Watch scraper (Next.js / RSC, pre-2000 filter)
        # Inventory is mostly modern Patek/AP/Rolex; the scraper applies
        # a Circa-based pre-year-2000 filter so only the vintage slice
        # (~26-30 listings) lands in the feed.
        continue-on-error: true
        run: python europeanwatch_scraper.py

      - name: Run Vintage Watch Collective scraper (Wix, productsWithMetaData)
        # Same Wix pattern as Chronoholic — productsWithMetaData.list[]
        # JSON blob embedded in /shop HTML, multi-brand. EUR-priced.
        continue-on-error: true
        run: python vintagewatchcollective_scraper.py

      - name: Run Watchurbia scraper (WooCommerce Store API, in-stock filter)
        # Watchurbia is a small German vintage dealer. WooCommerce site;
        # the scraper filters to the "Watches in Stock" category at the
        # API level so the sold archive doesn't pollute the feed.
        continue-on-error: true
        run: python watchurbia_scraper.py

      - name: Run Maunder Watches scraper (WooCommerce Store API, offset pagination)
        # UK dealer; Store API ignores `page` parameter so the scraper
        # walks via `offset` instead. Long Chrome UAs return 403 from
        # their bot-protection — short Mozilla/5.0 UA is fine.
        continue-on-error: true
        run: python maunderwatches_scraper.py

      - name: Run Watch Club scraper (TaffyDB JSON catalog)
        # UK dealer (Cardiff). Entire catalogue in a single 5MB JS file
        # at /upload/js/watches2018_bis.js wrapped as TAFFY([...]). No
        # detail-page fetches needed; ~57 active items today out of 4365
        # total (rest are sold archive with status != "1").
        continue-on-error: true
        run: python watchclub_scraper.py

      - name: Run Vintage Watch Shop scraper (WP custom-post + detail walk)
        # UK dealer (Vintage Heuer). WordPress with custom 'product'
        # post type but no WooCommerce — price isn't in the WP REST
        # response, so we walk the /watches-accessories/ index pages
        # for URL+title+image, then fetch each detail page for the
        # "Our price: £NNNN" pattern.
        continue-on-error: true
        run: python vintagewatchshop_scraper.py

      - name: Run Watches of Lancashire scraper (WooCommerce Store API)
        # UK dealer. Store API at category=watches; same short-UA
        # quirk as Maunder.
        continue-on-error: true
        run: python watchesoflancashire_scraper.py

      # eBay runs in its own workflow (.github/workflows/scrape-ebay.yml)
      # so a slow Browse API response or token blip doesn't slow the
      # dealer-listings cron. eBay can iterate on its own cadence and
      # commits to the same data/ebay.csv → merge.py picks it up on
      # any subsequent listings run.

      - name: Move CSVs to data folder
        run: |
          mkdir -p data
          [ -f windvintage_listings.csv ]         && mv windvintage_listings.csv         data/windvintage.csv         || echo "windvintage missing"
          [ -f menta_listings.csv ]               && mv menta_listings.csv               data/menta.csv               || echo "menta missing"
          [ -f collectorscorner_listings.csv ]    && mv collectorscorner_listings.csv    data/collectorscorner.csv    || echo "ccny missing"
          [ -f falco_listings.csv ]               && mv falco_listings.csv               data/falco.csv               || echo "falco missing"
          [ -f tropicalwatch_listings.csv ]       && mv tropicalwatch_listings.csv       data/tropicalwatch.csv       || echo "tropicalwatch missing"
          [ -f greyandpatina_listings.csv ]       && mv greyandpatina_listings.csv       data/greyandpatina.csv       || echo "greyandpatina missing"
          [ -f oliverandclarke_listings.csv ]     && mv oliverandclarke_listings.csv     data/oliverandclarke.csv     || echo "oliverandclarke missing"
          [ -f craftandtailored_listings.csv ]    && mv craftandtailored_listings.csv    data/craftandtailored.csv    || echo "craftandtailored missing"
          [ -f watchbrotherslondon_listings.csv ] && mv watchbrotherslondon_listings.csv data/watchbrotherslondon.csv || echo "watchbrotherslondon missing"
          [ -f mvvwatches_listings.csv ]          && mv mvvwatches_listings.csv          data/mvvwatches.csv          || echo "mvvwatches missing"
          [ -f db1983_listings.csv ]              && mv db1983_listings.csv              data/db1983.csv              || echo "db1983 missing"
          [ -f hairspring_listings.csv ]          && mv hairspring_listings.csv          data/hairspring.csv          || echo "hairspring missing"
          [ -f somlo_listings.csv ]               && mv somlo_listings.csv               data/somlo.csv               || echo "somlo missing"
          [ -f analogshift_listings.csv ]         && mv analogshift_listings.csv         data/analogshift.csv         || echo "analogshift missing"
          [ -f watchesofknightsbridge_listings.csv ] && mv watchesofknightsbridge_listings.csv data/watchesofknightsbridge.csv || echo "wok missing"
          [ -f belmont_listings.csv ]             && mv belmont_listings.csv             data/belmont.csv             || echo "belmont missing"
          [ -f bobswatches_listings.csv ]         && mv bobswatches_listings.csv         data/bobswatches.csv         || echo "bobswatches missing"
          [ -f watchfid_listings.csv ]            && mv watchfid_listings.csv            data/watchfid.csv            || echo "watchfid missing"
          [ -f bulangandsons_listings.csv ]       && mv bulangandsons_listings.csv       data/bulangandsons.csv       || echo "bulangandsons missing"
          [ -f moonphase_listings.csv ]           && mv moonphase_listings.csv           data/moonphase.csv           || echo "moonphase missing"
          [ -f huntington_listings.csv ]          && mv huntington_listings.csv          data/huntington.csv          || echo "huntington missing"
          [ -f thevintagewatch_listings.csv ]     && mv thevintagewatch_listings.csv     data/thevintagewatch.csv     || echo "thevintagewatch missing"
          [ -f avocadovintage_listings.csv ]      && mv avocadovintage_listings.csv      data/avocadovintage.csv      || echo "avocadovintage missing"
          [ -f chronoholic_listings.csv ]         && mv chronoholic_listings.csv         data/chronoholic.csv         || echo "chronoholic missing"
          [ -f vintagewatchfam_listings.csv ]     && mv vintagewatchfam_listings.csv     data/vintagewatchfam.csv     || echo "vintagewatchfam missing"
          [ -f shucktheoyster_listings.csv ]      && mv shucktheoyster_listings.csv      data/shucktheoyster.csv      || echo "shucktheoyster missing"
          [ -f centralwatch_listings.csv ]        && mv centralwatch_listings.csv        data/centralwatch.csv        || echo "centralwatch missing"
          [ -f europeanwatch_listings.csv ]       && mv europeanwatch_listings.csv       data/europeanwatch.csv       || echo "europeanwatch missing"
          [ -f vintagewatchcollective_listings.csv ] && mv vintagewatchcollective_listings.csv data/vintagewatchcollective.csv || echo "vintagewatchcollective missing"
          [ -f watchurbia_listings.csv ]          && mv watchurbia_listings.csv          data/watchurbia.csv          || echo "watchurbia missing"
          [ -f maunderwatches_listings.csv ]      && mv maunderwatches_listings.csv      data/maunderwatches.csv      || echo "maunderwatches missing"
          [ -f watchclub_listings.csv ]           && mv watchclub_listings.csv           data/watchclub.csv           || echo "watchclub missing"
          [ -f vintagewatchshop_listings.csv ]    && mv vintagewatchshop_listings.csv    data/vintagewatchshop.csv    || echo "vintagewatchshop missing"
          [ -f watchesoflancashire_listings.csv ] && mv watchesoflancashire_listings.csv data/watchesoflancashire.csv || echo "watchesoflancashire missing"

      - name: Merge into listings.json
        run: python merge.py --listings-only

      - name: Verify scrape health
        # Runs after merge.py. Compares each source's live count to its
        # rolling 7-day median; flags drops to zero or <30% of median.
        # `|| true` so a glitch never blocks the commit step — alerts
        # surface via stdout (visible in Actions logs) and the
        # committed public/verification.json.
        run: python verify_sources.py || true

      - name: Commit and push
        # Push race-resilient: if main has moved while we were scraping
        # (manual push, parallel workflow), rebase and retry up to 3 times.
        # Without this, the workflow occasionally fails because git push
        # is non-fast-forward.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Listings update $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push rejected, rebasing and retrying ($i/3)..."
            # `--strategy-option=theirs` means: when two runs collide on
            # the same file (almost always public/listings.json or
            # state.json), keep our local commit's version. Both runs are
            # legitimate scrapes; the later-finishing one is fresher and
            # safe to keep wholesale.
            if ! git pull --rebase --strategy-option=theirs; then
              echo "Rebase failed, aborting and retrying push"
              git rebase --abort 2>/dev/null || true
            fi
          done
          echo "Push still failing after 3 retries"
          exit 1
