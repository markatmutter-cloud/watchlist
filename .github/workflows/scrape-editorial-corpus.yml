name: Scrape editorial corpus

# Low-frequency cron for editorial-corpus scrapers. These sources
# publish 1-2 articles/week at most; daily scraping would just burn
# requests against unchanged content. Weekly is the right cadence
# for new-article discovery + the rolling 30-day re-fetch pass that
# catches author edits to existing articles.
#
# Cadence: Sunday morning Pacific Time (16:00 UTC). The main
# listings cron runs at 14/20/02 UTC; this slot avoids overlap.
#
# Scope (2026-05-19):
# - bring_a_loupe_scraper.py    → public/bring_a_loupe.json
#   (Hodinkee column, ~251 articles, sitemap-based URL discovery)
# - rolex_magazine_scraper.py   → public/rolex_magazine.json
#   (Jake's Rolex World, ~3,840 posts, Blogger JSON feeds API,
#   incremental on every cron — stops at most-recently-scraped URL)
# - onthedash_scraper.py        → public/onthedash.json
#   (Jeff Stein / On The Dash, ~206 article posts, WordPress REST
#   API, incremental — stops at most-recently-scraped URL.
#   Catalogue-shaped /chronograph/ pages explicitly excluded.)
# - bulangandsons_watch_talks_scraper.py → public/bulang_watch_talks.json
#   (Bulang & Sons editorial blog, ~166 articles, Shopify blog
#   pagination. Editorial-only: feeds the corpus, NOT the Sold-
#   archive view — the Bulang dealer inventory has its own scraper
#   in the listings cron.)
# - hodinkee_shop_scraper.py    → public/hodinkee_shop.json
#   (Hodinkee Shop vintage archive, ~2,346 sold products, Shopify
#   products.json API. Frozen since Feb 2023. Dual-track: feeds
#   editorial corpus AND projects into App.js's Sold-archive view
#   via `hodinkeeShopItems` — same pattern as Hairspring Finds.)
# - hodinkee_reference_points_scraper.py → public/hodinkee_reference_points.json
#   (Hodinkee's flagship per-reference series — ~10 deep-dive
#   articles totaling ~50K words. Sitemap-based discovery, same
#   Hodinkee parser as Bring a Loupe.)
# - acollectedman_journal_scraper.py → public/acollectedman_journal.json
#   (A Collected Man / London independent + vintage dealer Journal,
#   ~321 articles. Sitemap-based discovery because Shopify pagination
#   caps at ~28 on this site. Collector's guides + design-technical
#   essays + maker interviews.)
#
# Hairspring Finds intentionally NOT included here — it runs in the
# main listings workflow (scrape-listings.yml) because its records
# also project into the Sold archive view, so daily refresh matches
# the rest of the dealer/lot pipeline. Editorial-only sources (no
# transactional surface) belong here.
#
# Future additions queued: WatchFID Journal (WordPress), Wind
# Vintage journal, Hairspring non-Finds blog. Each as its own
# scraper file emitting one JSON; add a step below per source.

on:
  schedule:
    - cron: '0 16 * * 0'   # 8am PST / 9am PDT Sunday
  workflow_dispatch:

concurrency:
  group: scrape-editorial-corpus
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Hodinkee Bring a Loupe scraper
        # Sitemap-based URL discovery, ~251 articles. Incremental
        # by default: re-fetches only entries missing or >30 days
        # since last scrape. First full run takes ~3-4 min;
        # subsequent runs are sub-minute (typically 0-2 new
        # articles + the rolling refresh window).
        continue-on-error: true
        run: python bring_a_loupe_scraper.py

      - name: Run Rolex Magazine scraper
        # Blogger JSON feeds API, ~3,840 posts in corpus. Incremental
        # on every cron — walks the feed head until it hits the
        # most-recently-scraped URL. Typical weekly run fetches
        # 5-15 new posts in <1 second. ROLEX_MAGAZINE_FULL_REFRESH=1
        # forces a full re-walk (~30 sec) if records need to be
        # rebuilt.
        continue-on-error: true
        run: python rolex_magazine_scraper.py

      - name: Run On The Dash scraper
        # WordPress REST API, ~206 article posts (catalogue-shaped
        # /chronograph/ pages excluded — those don't fit body_text +
        # word_count). New posts ship ~1×/month so this is wasteful
        # on a weekly cron in absolute terms, but cheap on incremental
        # mode (stops at the first known URL — typically a single
        # request when nothing new has shipped). ONTHEDASH_FULL_REFRESH=1
        # forces a full walk.
        continue-on-error: true
        run: python onthedash_scraper.py

      - name: Run Bulang & Sons Watch Talks scraper
        # Shopify blog, ~166 articles (the dealer's editorial blog,
        # not the inventory). Incremental — re-fetches missing
        # entries + the rolling 30-day refresh window. Full walk
        # takes ~2 min; typical weekly run is sub-minute (no new
        # posts most weeks).
        continue-on-error: true
        run: python bulangandsons_watch_talks_scraper.py

      - name: Run Hodinkee Shop archive scraper
        # Shopify products.json API, ~2,346 products. Collection
        # frozen since Feb 2023 (Hodinkee shut the vintage shop),
        # so weekly runs are no-ops except for the rare data
        # correction. Full walk ~15s; incremental skips records
        # already on disk. Dual-track: feeds editorial corpus AND
        # the Sold-archive projection in App.js.
        continue-on-error: true
        run: python hodinkee_shop_scraper.py

      - name: Run Hodinkee Reference Points scraper
        # Sitemap-based discovery, ~10 articles. Encyclopedia-grade
        # per-reference deep dives (Pulvirent Submariner 10k words,
        # Clymer Carrera 8k, Bues GMT-Master 9k, etc.). New entries
        # land ~1×/year so weekly is wasteful in absolute terms but
        # cheap on incremental.
        continue-on-error: true
        run: python hodinkee_reference_points_scraper.py

      - name: Run A Collected Man Journal scraper
        # Sitemap-based discovery (Shopify blog pagination caps at
        # ~28 articles even though the full corpus is ~321; switched
        # to sitemap_blogs_1.xml — same approach as bring_a_loupe).
        # London-based independent / unusual / vintage dealer; the
        # Journal carries collector's guides, design-technical essays,
        # and interviews with makers + collectors. Incremental with
        # 30-day rolling refresh; full walk ~3 min.
        continue-on-error: true
        run: python acollectedman_journal_scraper.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/bring_a_loupe.json public/bring_a_loupe_bodies.json \
                  public/rolex_magazine.json public/rolex_magazine_bodies.json \
                  public/onthedash.json public/onthedash_bodies.json \
                  public/bulang_watch_talks.json public/bulang_watch_talks_bodies.json \
                  public/hodinkee_shop.json public/hodinkee_shop_bodies.json \
                  public/hodinkee_reference_points.json public/hodinkee_reference_points_bodies.json \
                  public/acollectedman_journal.json public/acollectedman_journal_bodies.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Editorial corpus refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push rejected, rebasing and retrying ($i/3)..."
            if ! git pull --rebase --strategy-option=theirs; then
              echo "Rebase failed, aborting and retrying push"
              git rebase --abort 2>/dev/null || true
            fi
          done
          echo "Push still failing after 3 retries"
          exit 1
